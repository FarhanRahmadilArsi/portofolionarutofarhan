  <main id="main-content">
    <section id="guest-sec" class="guest-section" aria-labelledby="guest-title">
      <div class="section-header">
        <span class="section-tag">// 07</span>
        <h1 class="section-title" id="guest-title">GUESTBOOK - TINGGALKAN PESAN</h1>
        <div class="divider-line"></div>
      </div>
      <div class="guest-layout">
        <form class="guest-form" id="guest-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="g-name">Nama</label>
              <input class="form-input" id="g-name" name="name" placeholder="Konoha Ninja..." autocomplete="name" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="g-village">Desa Asal</label>
              <input class="form-input" id="g-village" name="village" placeholder="Hidden Leaf...">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="g-msg">Pesan Jutsu</label>
            <textarea class="form-textarea" id="g-msg" name="message" rows="3" placeholder="Tinggalkan pesan untuk Farhan..." required></textarea>
          </div>
          <button class="submit-btn" type="submit">KIRIM PESAN</button>
        </form>
        <div>
          <div class="messages-title">PESAN MASUK</div>
          <div class="messages-list" id="messages-list" aria-live="polite"></div>
        </div>
      </div>
    </section>
